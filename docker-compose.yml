services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wathb
      POSTGRES_PASSWORD: wathb
      POSTGRES_DB: wathb
    ports:
      - "5432:5432"
    volumes:
      - wathb_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wathb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  wathb_pg_data:
